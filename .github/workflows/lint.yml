name: golang-ci-lint
on:
  push:
    branches:
      # デフォルトブランチに合わせて変更
      - master
  pull_request:

permissions:
  contents: read
jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5.0.2
        with:
          go-version-file: "./go.mod"
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          # golangci-lint はビルドされた Go バージョンと go.mod の Go バージョンの
          # 組み合わせでエラーになるため、latest ではなく明示的に固定する。
          version: v2.12.2
          args: --config=.golangci.yml --timeout 1m
