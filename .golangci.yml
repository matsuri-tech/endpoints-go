version: "2"
linters:
  default: standard
  enable:
    - durationcheck
    - forcetypeassert
    - gocognit
    - goconst
    - gocritic
    - gochecknoglobals
    - errorlint
    - exhaustive
    - revive
  settings:
    revive:
      rules:
        - name: var-naming
          disabled: true
  exclusions:
    # Restore golangci-lint v1's default exclusions (exclude-use-default: true),
    # e.g. unchecked deferred file.Close() (errcheck), which v1 excluded but v2
    # does not unless these presets are opted into.
    presets:
      - legacy
      - std-error-handling
    # Exclude some linters from running on tests files.
    rules:
      - path: _test\.go
        linters:
          - revive
          - goconst
formatters:
  enable:
    - gofumpt
issues:
  max-same-issues: 0
